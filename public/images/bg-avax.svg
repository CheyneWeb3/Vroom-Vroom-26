    <path d="M540 0 V900" stroke="#ffffff"/>
    <path d="M630 0 V900" stroke="#ffffff"/>
    <path d="M720 0 V900" stroke="#ffffff"/>
    <path d="M810 0 V900" stroke="#ffffff"/>
    <path d="M900 0 V900" stroke="#ffffff"/>
