<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="g1" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E84142" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#1A1F2E" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0B0D12" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#g1)"/>

  <!-- soft diagonal sheen -->
  <path d="M-150,950 L750,-50 L900,-50 L0,950 Z" fill="url(#g2)"/>

  <!-- subtle floating blobs -->
  <g filter="url(#blur)" opacity="0.55">
    <circle cx="1250" cy="200" r="140" fill="#E84142" opacity="0.35"/>
    <circle cx="1180" cy="260" r="90" fill="#FF6B6B" opacity="0.22"/>
    <circle cx="420" cy="720" r="160" fill="#E84142" opacity="0.18"/>
    <circle cx="520" cy="650" r="110" fill="#FF6B6B" opacity="0.12"/>
  </g>

  <!-- top grid hint -->
